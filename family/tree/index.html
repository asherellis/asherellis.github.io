<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Source Sans Pro", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
       background: #fafafa; color: #333; overflow: hidden; height: 100vh; }

/* Site nav header */
#site-header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  background: #fff; border-bottom: 1px solid #dedfe0;
  display: flex; align-items: center;
  padding: 0 20px; height: 44px;
}
#site-brand { font-size: 15px; font-weight: 600; color: #333; text-decoration: none;
              white-space: nowrap; margin-right: 20px; letter-spacing: -0.01em; transition: color 0.15s; }
#site-brand:hover { color: #515151; text-decoration: none; }
#site-nav { display: flex; align-items: center; }
#site-nav a { color: #aaa; font-weight: 300; font-size: 14px; text-decoration: none;
              text-transform: lowercase; padding: 0 10px; transition: color 0.15s; white-space: nowrap; }
#site-nav a:hover { color: #333; text-decoration: none; }
#site-nav a.active { color: #333; font-weight: 500; }
#tree-controls { display: flex; align-items: center; gap: 8px; margin-left: auto; }
#search { background: #fff; border: 1px solid #dedfe0; border-radius: 4px;
          color: #515151; padding: 4px 9px; font-size: 12px; font-weight: 300;
          width: 160px; outline: none; font-family: inherit; transition: border-color 0.15s; }
#search:focus { border-color: #aaa; }
#search::placeholder { color: #bbb; }
.tb-btn { background: #fff; border: 1px solid #dedfe0; color: #aaa; border-radius: 4px;
          padding: 3px 9px; font-size: 11px; cursor: pointer; white-space: nowrap;
          font-family: inherit; font-weight: 300; transition: color 0.12s, border-color 0.12s; }
.tb-btn:hover { border-color: #aaa; color: #515151; }
.tb-btn.active { border-color: #268bd2; color: #268bd2; background: rgba(38,139,210,0.05); }
#gen-label { color: #aaa; font-size: 11px; font-weight: 300; white-space: nowrap; }
#gen-slider { width: 72px; accent-color: #268bd2; cursor: pointer; }
.spacer { flex: 1; }
#match-count { font-size: 11px; color: #aaa; font-weight: 300; white-space: nowrap; }

/* SVG canvas */
#canvas { position: fixed; top: 44px; left: 0; right: 0; bottom: 0; }
svg { width: 100%; height: 100%; }
.link { fill: none; stroke: #ccc; stroke-width: 1.5px; }
.link.paternal-gf  { stroke: #4a7fa5; }
.link.paternal-gm  { stroke: #b8872e; }
.link.maternal-gf  { stroke: #4a8a5a; }
.link.maternal-gm  { stroke: #8a4a6a; }

/* Person cards */
.person-card { cursor: pointer; }
.card-bg {
  rx: 7; ry: 7;
  stroke-width: 1.5;
  fill: #fff;
  stroke: #ddd;
  transition: stroke 0.15s;
}
.card-bg.paternal-gf { fill: #fff; stroke: #4a7fa5; }
.card-bg.paternal-gm { fill: #fff; stroke: #b8872e; }
.card-bg.maternal-gf { fill: #fff; stroke: #4a8a5a; }
.card-bg.maternal-gm { fill: #fff; stroke: #8a4a6a; }
.card-bg.self        { fill: #fff; stroke: #333; stroke-width: 2; }
.card-bg.sibling     { fill: #fff; stroke: #ccc; }
.card-bg.unknown-bg  { fill: #f5f5f5; stroke: #e0e0e0; }

.person-card:hover .card-bg { stroke-width: 2.5; }
.person-card.selected .card-bg { stroke-width: 3; filter: brightness(1.3); }

.card-name { fill: #333; font-size: 12px; font-weight: 600; }
.card-name.long { font-size: 10.5px; }
.card-dates { fill: #888; font-size: 10px; }
.card-unknown { fill: #bbb; font-size: 11px; font-style: italic; }

/* Expand button on cards */
.expand-btn { cursor: pointer; }
.expand-circle { fill: #f0f0f0; stroke: #ccc; stroke-width: 1; }
.expand-circle:hover { fill: #e0e0e0; }
.expand-text { fill: #aaa; font-size: 11px; font-weight: 700; pointer-events: none; }

/* Detail panel — white, matches rest of site */
#detail {
  position: fixed; top: 44px; right: 0; bottom: 0; width: 290px;
  background: #fff; border-left: 1px solid #dedfe0;
  padding: 24px 20px 20px; overflow-y: auto;
  transform: translateX(100%); transition: transform 0.22s ease;
  z-index: 150; color: #515151;
  font-family: "Source Sans Pro", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}
#detail.open { transform: translateX(0); }
#detail-close { position: absolute; top: 12px; right: 12px;
                background: transparent; border: 1px solid #dedfe0; color: #aaa; border-radius: 4px;
                width: 24px; height: 24px; cursor: pointer; font-size: 14px; line-height: 22px; }
#detail-close:hover { border-color: #aaa; color: #515151; }
#detail h2 { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 2px; line-height: 1.3;
             padding-right: 32px; letter-spacing: -0.02em; }
#detail .d-subtitle { font-size: 11px; color: #aaa; margin-bottom: 18px; font-weight: 300; }
.d-section { margin-bottom: 13px; }
.d-label { font-size: 9px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
           color: #bbb; margin-bottom: 2px; }
.d-value { font-size: 13px; color: #515151; line-height: 1.5; font-weight: 300; }
.d-value.empty { color: #ccc; font-style: italic; }
.d-divider { border: none; border-top: 1px solid #dedfe0; margin: 14px 0; }
.d-link { color: #268bd2; text-decoration: none; font-size: 12px; cursor: pointer; font-weight: 300; }
.d-link:hover { text-decoration: underline; }
#detail .d-person-links a { display: block; color: #268bd2; font-size: 13px;
                             text-decoration: none; padding: 2px 0; font-weight: 300; }
#detail .d-person-links a:hover { text-decoration: underline; }

/* Legend */
#legend {
  position: fixed; bottom: 16px; left: 16px;
  background: rgba(255,255,255,0.92); border: 1px solid #dedfe0; border-radius: 5px;
  padding: 8px 12px; font-size: 11px; z-index: 100; font-weight: 300; color: #515151;
  backdrop-filter: blur(6px);
  font-family: "Source Sans Pro", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}
.leg-item { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; }
.leg-item:last-child { margin-bottom: 0; }
.leg-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

/* Zoom controls */
#zoom-controls { position: fixed; bottom: 16px; right: 16px; z-index: 100;
                 display: flex; flex-direction: column; gap: 5px; }
.zoom-btn { background: rgba(255,255,255,0.92); border: 1px solid #dedfe0; color: #aaa; border-radius: 4px;
            width: 30px; height: 30px; font-size: 16px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(6px); transition: color 0.12s, border-color 0.12s; }
.zoom-btn:hover { color: #515151; border-color: #aaa; }

/* Search highlight */
.person-card.dimmed { opacity: 0.25; }
.person-card.highlighted .card-bg { stroke-width: 3; filter: brightness(1.4); }
</style>

const people = RAW.people;
const DEFAULT_ROOT = RAW.root;

// ── Branch assignment ─────────────────────────────────────────────────────────
// Walk up from known grandparents to tag every ancestor with a branch
const BRANCHES = {
  "paternal-gf": null,   // Papa Sheldon
  "paternal-gm": null,   // Grandma Julie
  "maternal-gf": null,   // Zayde Joel
  "maternal-gm": null,   // Grandma Eileen
};

// Find grandparents by name pattern
for (const [id, p] of Object.entries(people)) {
  const n = p.name.toLowerCase();
  if (n.includes("sheldon") && n.includes("ellis")) BRANCHES["paternal-gf"] = id;
  if ((n.includes("julia") || n.includes("julie") || n.includes("hilda")) && n.includes("harrosh")) BRANCHES["paternal-gm"] = id;
  if (n.includes("joel") && n.includes("brody")) BRANCHES["maternal-gf"] = id;
  if (n.includes("eileen") && (n.includes("rogovin") || n.includes("brody"))) BRANCHES["maternal-gm"] = id;
}

const branchOf = {};
function tagBranch(id, branch, visited = new Set()) {
  if (!id || visited.has(id) || branchOf[id]) return;
  visited.add(id);
  branchOf[id] = branch;
  const p = people[id];
  if (p) p.parents.forEach(pid => tagBranch(pid, branch, visited));
}
for (const [branch, id] of Object.entries(BRANCHES)) {
  if (id) tagBranch(id, branch);
}

// Asher's children (to find Mark/Cheryl split)
const asher = people[DEFAULT_ROOT];
if (asher) {
  const parents = asher.parents;
  if (parents[0]) {
    const p0 = people[parents[0]];
    const isMale0 = p0 && p0.sex === "M";
    tagBranch(parents[0], isMale0 ? "paternal-gf-line" : "paternal-gm-line");
  }
}

// ── Layout constants ──────────────────────────────────────────────────────────
const NODE_W  = 168;
const NODE_H  = 56;
const GEN_GAP = 210;   // horizontal gap between generations
const ROW_GAP = 68;    // vertical gap between rows

let currentRoot = DEFAULT_ROOT;
let maxGen = 5;
let selectedId = null;

// ── D3 setup ──────────────────────────────────────────────────────────────────
const svg   = d3.select("#svg");
const rootG = d3.select("#root-g");
const linksG = d3.select("#links-g");
const nodesG = d3.select("#nodes-g");

const zoom = d3.zoom()
  .scaleExtent([0.08, 3])
  .on("zoom", e => rootG.attr("transform", e.transform));

svg.call(zoom);

// ── Build hierarchy ───────────────────────────────────────────────────────────
// Returns a flat array of {node, x, y} plus an array of links {source, target}.
// Gen-0 is expanded to show all siblings of rootId, not just rootId alone.
function buildAncestorLayout(rootId, maxGens) {
  const nodes = [];
  const links = [];

  function place(id, gen, slotIndex, slotCount) {
    if (!id || gen > maxGens) return;
    const p = people[id];
    const displayName = p ? p.name : "Unknown";
    const isUnknown = !p || displayName === "Unknown" || displayName === "";
    const x = gen * GEN_GAP;
    const y = (slotIndex + 0.5) * (ROW_GAP * Math.pow(2, maxGens - gen));
    nodes.push({ id, gen, x, y, name: displayName, isUnknown,
                 person: p || null, branch: branchOf[id] || (id === rootId ? "self" : "") });
    if (!p || gen >= maxGens) return;
    const pars = p.parents.filter(pid => pid && people[pid]);
    pars.forEach((pid, i) => {
      links.push({ source: id, target: pid, branch: branchOf[pid] || "" });
      place(pid, gen + 1, slotIndex * 2 + i, slotCount * 2);
    });
  }

  // Build the ancestor tree with rootId as the starting point
  place(rootId, 0, 0, 1);

  // Find all siblings (other children of the same parents)
  const rootPerson = people[rootId];
  let siblings = [];
  if (rootPerson && rootPerson.parents.length > 0) {
    for (const pid of rootPerson.parents) {
      const parent = people[pid];
      if (parent && parent.children.length > 1) {
        siblings = parent.children.filter(id => people[id]);
        break;
      }
    }
  }

  if (siblings.length > 1) {
    // Spread siblings evenly across the y range between the two parents (gen-1 nodes)
    const genOneYs = nodes.filter(n => n.gen === 1).map(n => n.y);
    const minY = genOneYs.length ? Math.min(...genOneYs) : 0;
    const maxY = genOneYs.length ? Math.max(...genOneYs) : ROW_GAP * 3;
    const sibSpacing = (maxY - minY) / siblings.length;

    // Remove the single root node and its outgoing links, replace with full sibling row
    const ri = nodes.findIndex(n => n.id === rootId && n.gen === 0);
    if (ri !== -1) nodes.splice(ri, 1);
    for (let i = links.length - 1; i >= 0; i--) {
      if (links[i].source === rootId) links.splice(i, 1);
    }

    siblings.forEach((sibId, i) => {
      const sib = people[sibId];
      const sibY = minY + (i + 0.5) * sibSpacing;
      nodes.push({ id: sibId, gen: 0, x: 0, y: sibY,
                   name: sib ? sib.name : "Unknown", isUnknown: !sib,
                   person: sib || null,
                   branch: sibId === rootId ? "self" : "sibling" });
      // Connect each sibling to shared parents
      rootPerson.parents.forEach(pid => {
        if (people[pid]) links.push({ source: sibId, target: pid, branch: branchOf[pid] || "" });
      });
    });
  }

  return { nodes, links };
}

// ── Render ─────────────────────────────────────────────────────────────────────
function render(rootId, gens) {
  const { nodes, links } = buildAncestorLayout(rootId, gens);

  // Position map by id
  const posMap = {};
  nodes.forEach(n => { posMap[n.id] = n; });

  // ── Links ──
  const linkSel = linksG.selectAll(".link")
    .data(links, d => d.source + "--" + d.target);

  linkSel.enter()
    .append("path")
    .attr("class", d => `link ${d.branch}`)
    .merge(linkSel)
    .attr("d", d => {
      const s = posMap[d.source];
      const t = posMap[d.target];
      if (!s || !t) return "";
      const sx = s.x + NODE_W, sy = s.y + NODE_H / 2;
      const tx = t.x,          ty = t.y + NODE_H / 2;
      const mx = (sx + tx) / 2;
      return `M${sx},${sy} C${mx},${sy} ${mx},${ty} ${tx},${ty}`;
    });

  linkSel.exit().remove();

  // ── Nodes ──
  const nodeSel = nodesG.selectAll(".person-card")
    .data(nodes, d => d.id + "-" + d.gen);

  const enter = nodeSel.enter()
    .append("g")
    .attr("class", d => `person-card ${d.id === selectedId ? "selected" : ""}`)
    .style("cursor", "pointer")
    .on("click", (event, d) => {
      event.stopPropagation();
      if (!d.isUnknown) selectPerson(d.id);
    });

  enter.append("rect")
    .attr("class", d => {
      if (d.isUnknown) return "card-bg unknown-bg";
      if (d.branch === "self")    return "card-bg self";
      if (d.branch === "sibling") return "card-bg sibling";
      return `card-bg ${d.branch}`;
    })
    .attr("width", NODE_W)
    .attr("height", NODE_H);

  enter.append("text")
    .attr("class", d => {
      const cls = "card-name";
      return d.name && d.name.length > 22 ? cls + " long" : cls;
    })
    .attr("x", 12).attr("y", 20)
    .text(d => d.isUnknown ? "" : truncate(d.name, 26));

  enter.append("text")
    .attr("class", "card-dates")
    .attr("x", 12).attr("y", 36)
    .text(d => {
      if (d.isUnknown || !d.person) return "";
      const b = shortYear(d.person.birth_date);
      const dd = d.person.death ? shortYear(d.person.death_date) : "";
      if (!b && !dd) return "";
      return dd ? `${b || "?"} – ${dd || "?"}` : (b ? `b. ${b}` : "");
    });

  enter.append("text")
    .attr("class", "card-dates")
    .attr("x", 12).attr("y", 50)
    .text(d => {
      if (!d.person) return "";
      const place = shortPlace(d.person.birth_place || d.person.death_place);
      return place;
    });

  // Unknown placeholder text
  enter.append("text")
    .attr("class", "card-unknown")
    .attr("x", NODE_W / 2).attr("y", NODE_H / 2 + 4)
    .attr("text-anchor", "middle")
    .text(d => d.isUnknown ? "Unknown" : "");

  // Merge update
  const all = enter.merge(nodeSel);
  all.attr("transform", d => `translate(${d.x}, ${d.y - NODE_H/2})`);
  all.attr("class", d => {
    let cls = "person-card";
    if (d.id === selectedId) cls += " selected";
    return cls;
  });

  nodeSel.exit().remove();

  // Auto-fit view on first render or root change
  autoFit(nodes);
}

function autoFit(nodes) {
  if (!nodes.length) return;
  const xs = nodes.map(n => n.x);
  const ys = nodes.map(n => n.y);
  const minX = Math.min(...xs) - 20;
  const maxX = Math.max(...xs) + NODE_W + 20;
  const minY = Math.min(...ys) - NODE_H - 20;
  const maxY = Math.max(...ys) + NODE_H + 20;
  const cw = svg.node().clientWidth  || 1200;
  const ch = (svg.node().clientHeight || 800) - 0;
  const scale = Math.min(0.95, Math.min(cw / (maxX - minX), ch / (maxY - minY)));
  const tx = (cw - (maxX + minX) * scale) / 2;
  const ty = (ch - (maxY + minY) * scale) / 2;
  svg.transition().duration(600)
    .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

// ── Person detail panel ────────────────────────────────────────────────────────
function selectPerson(id) {
  selectedId = id;
  const p = people[id];
  if (!p) return;

  document.getElementById("d-name").textContent = p.name;
  document.getElementById("d-subtitle").textContent = relationLabel(id);

  const birth = [p.birth_date, p.birth_place].filter(Boolean).join("  ·  ") || "Unknown";
  document.getElementById("d-birth").textContent = birth;
  document.getElementById("d-birth").className = birth === "Unknown" ? "d-value empty" : "d-value";

  let death;
  if (!p.death && !p.death_date) {
    death = "—";
  } else {
    death = [p.death_date, p.death_place].filter(Boolean).join("  ·  ") || "Deceased (date unknown)";
  }
  document.getElementById("d-death").textContent = death;
  document.getElementById("d-death").className = death === "—" ? "d-value empty" : "d-value";

  // Marriages
  const marriages = p.marriages.filter(m => m.spouse && people[m.spouse]);
  const mEl = document.getElementById("d-marriages");
  mEl.innerHTML = "";
  if (marriages.length) {
    marriages.forEach(m => {
      const sp = people[m.spouse];
      const line = document.createElement("div");
      line.style.marginBottom = "6px";
      const parts = [sp ? sp.name : "Unknown"];
      if (m.date) parts.push(m.date);
      if (m.place) parts.push(shortPlace(m.place, 35));
      line.textContent = parts.join("  ·  ");
      line.style.fontSize = "13px"; line.style.color = "#666";
      mEl.appendChild(line);
    });
    document.getElementById("d-marriages-section").style.display = "";
  } else {
    document.getElementById("d-marriages-section").style.display = "none";
  }

  // Parents
  const parentsEl = document.getElementById("d-parents");
  parentsEl.innerHTML = "";
  p.parents.forEach(pid => {
    const par = people[pid];
    if (!par) return;
    const a = document.createElement("a");
    a.textContent = par.name;
    a.onclick = () => selectPerson(pid);
    parentsEl.appendChild(a);
  });
  if (!p.parents.length) parentsEl.innerHTML = '<span style="color:#bbb;font-size:13px;font-style:italic">Unknown</span>';

  // Children
  const childrenEl = document.getElementById("d-children");
  childrenEl.innerHTML = "";
  p.children.forEach(cid => {
    const ch = people[cid];
    if (!ch) return;
    const a = document.createElement("a");
    a.textContent = ch.name;
    a.onclick = () => selectPerson(cid);
    childrenEl.appendChild(a);
  });
  if (!p.children.length) childrenEl.innerHTML = '<span style="color:#bbb;font-size:13px;font-style:italic">None recorded</span>';

  document.getElementById("d-focus").onclick = () => {
    currentRoot = id;
    render(currentRoot, maxGen);
  };

  document.getElementById("detail").classList.add("open");

  // Highlight selected node
  nodesG.selectAll(".person-card")
    .classed("selected", d => d.id === id);
}

function relationLabel(id) {
  const p = people[id];
  if (!p) return "";
  // Simple relation based on sex + branch
  const br = branchOf[id] || "";
  if (id === DEFAULT_ROOT) return "";
  const labels = {
    "paternal-gf": "Paternal grandfather's line",
    "paternal-gm": "Paternal grandmother's line (Harrosh)",
    "maternal-gf": "Maternal grandfather's line (Brody)",
    "maternal-gm": "Maternal grandmother's line (Rogovin)",
  };
  return labels[br] || "";
}

// ── Search ────────────────────────────────────────────────────────────────────
let searchTimeout;
document.getElementById("search").addEventListener("input", function() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => doSearch(this.value.trim()), 150);
});

function doSearch(q) {
  const countEl = document.getElementById("match-count");
  if (!q) {
    nodesG.selectAll(".person-card").classed("dimmed", false).classed("highlighted", false);
    countEl.textContent = "";
    return;
  }
  const ql = q.toLowerCase();
  let count = 0;
  nodesG.selectAll(".person-card").each(function(d) {
    const match = d.name && d.name.toLowerCase().includes(ql);
    d3.select(this).classed("dimmed", !match).classed("highlighted", match);
    if (match) count++;
  });
  countEl.textContent = count ? `${count} match${count > 1 ? "es" : ""}` : "No matches";
}

// ── Controls ──────────────────────────────────────────────────────────────────
document.getElementById("gen-slider").addEventListener("input", function() {
  maxGen = +this.value;
  document.getElementById("gen-val").textContent = maxGen;
  render(currentRoot, maxGen);
});

document.getElementById("btn-reset-view").addEventListener("click", () => {
  currentRoot = DEFAULT_ROOT;
  render(currentRoot, maxGen);
});

document.getElementById("detail-close").addEventListener("click", () => {
  document.getElementById("detail").classList.remove("open");
  selectedId = null;
  nodesG.selectAll(".person-card").classed("selected", false);
});

document.getElementById("btn-zoom-in").addEventListener("click", () => {
  svg.transition().duration(250).call(zoom.scaleBy, 1.4);
});
document.getElementById("btn-zoom-out").addEventListener("click", () => {
  svg.transition().duration(250).call(zoom.scaleBy, 0.7);
});

svg.on("click", () => {
  document.getElementById("detail").classList.remove("open");
  selectedId = null;
  nodesG.selectAll(".person-card").classed("selected", false);
});

document.addEventListener("keydown", e => {
  if (e.key === "Escape") {
    document.getElementById("detail").classList.remove("open");
    selectedId = null;
    nodesG.selectAll(".person-card").classed("selected", false);
  }
});

// Ancestor / Full-tree mode toggle
document.getElementById("btn-ancestors").addEventListener("click", function() {
  this.classList.add("active");
  document.getElementById("btn-all").classList.remove("active");
  render(currentRoot, maxGen);
});

document.getElementById("btn-all").addEventListener("click", function() {
  // Full-tree mode: just render ancestors from default root for now,
  // but with max generations turned up
  this.classList.add("active");
  document.getElementById("btn-ancestors").classList.remove("active");
  const old = maxGen;
  maxGen = 8;
  document.getElementById("gen-val").textContent = maxGen;
  document.getElementById("gen-slider").value = maxGen;
  render(DEFAULT_ROOT, 8);
});

// ── Helpers ───────────────────────────────────────────────────────────────────
function truncate(str, n) {
  return str && str.length > n ? str.slice(0, n - 1) + "…" : (str || "");
}
function shortYear(date) {
  if (!date) return "";
  const m = date.match(/\b(\d{4})\b/);
  return m ? m[1] : date.split(" ").pop();
}
function shortPlace(place, maxLen = 28) {
  if (!place) return "";
  // Take first two parts of comma-separated place
  const parts = place.split(",").map(s => s.trim());
  const short = parts.slice(0, 2).join(", ");
  return short.length > maxLen ? short.slice(0, maxLen - 1) + "…" : short;
}

// ── Init ──────────────────────────────────────────────────────────────────────
render(currentRoot, maxGen);
</script>
